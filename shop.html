<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHOP | INCLO.STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#050505;
color:white;
padding:15px 20px;
overflow-x:hidden;
}

/* BACKGROUND LOGO */

.bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:450px;
opacity:0.02;
z-index:-1;
pointer-events:none;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:35px;
}

.est{
font-size:11px;
letter-spacing:6px;
color:#777;
margin-bottom:10px;
}

.header h1{
font-family:'Cinzel',serif;
font-size:52px;
letter-spacing:5px;
margin-bottom:18px;
}

/* PRODUCTS */

.products{
display:flex;
flex-direction:column;
gap:24px;
}

/* CARD */

.card{
width:100%;

background:
linear-gradient(
145deg,
rgba(255,255,255,0.04),
rgba(255,255,255,0.01)
);

border:
1px solid rgba(255,255,255,0.08);

border-radius:28px;

overflow:hidden;

backdrop-filter:blur(12px);

transition:0.4s;
}

.card:hover{
transform:translateY(-6px);
border:1px solid rgba(255,255,255,0.15);
}

/* IMAGE */

.card img{
width:100%;
height:320px;
object-fit:cover;
}

/* INFO */

.info{
padding:20px;
}

.info h2{
font-size:22px;
margin-bottom:10px;
font-weight:600;
}

.price{
font-size:16px;
margin-bottom:14px;
font-weight:500;
}

.size{
margin-bottom:18px;
}

.size label{
font-size:12px;
letter-spacing:2px;
color:#9d9d9d;
display:block;
margin-bottom:10px;
}

.size-option{
padding:8px 16px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:transparent;
color:white;
cursor:pointer;
margin-right:8px;
font-size:12px;
transition:0.3s;
}

.size-option:hover{
background:white;
color:black;
}

.size-option.active{
background:white;
color:black;
}

/* BUTTON */

.btn{
display:inline-block;

padding:12px 28px;

border-radius:100px;

background:white;
color:black;

text-decoration:none;

font-size:11px;
letter-spacing:3px;
font-weight:600;

transition:0.4s;
}

.btn:hover{
transform:scale(1.04);
}

/* MOBILE */

@media(max-width:768px){

.header h1{
font-size:34px;
}

.card img{
height:250px;
}

.info{
padding:16px;
}

.info h2{
font-size:18px;
}

.price{
font-size:14px;
}

.btn{
width:100%;
text-align:center;
}

.bg-logo{
width:320px;
}

}

</style>
</head>

<body>

<!-- BACKGROUND -->

<img src="logo_incloofficial.png" class="bg-logo">

<!-- HEADER -->

<div class="header">

<div class="est">
EST.2022
</div>

<h1>
INCLO STORE<br>
COLLECTION
</h1>

</div>

<!-- PRODUCTS -->

<div class="products">

<!-- PRODUCT 1 -->

<div class="card">

<img src="noir_front.jpg">

<div class="info">

<h2>SNSB NOIR HOODIE</h2>

<div class="price">
IDR 680.000
</div>

<div class="size">

<label>SIZE</label>

<button class="size-option active"
onclick="goToShipping('SNSB-NOIR-HOODIE','M')">
M
</button>

</div>

<a href="#"
class="btn"
onclick="goToShipping('SNSB-NOIR-HOODIE','M')">
BUY NOW
</a>

</div>
</div>

<!-- PRODUCT 2 -->

<div class="card">

<img src="tee_black.jpg">

<div class="info">

<h2>OVERSHIRT TROUBLEMAKER</h2>

<div class="price">
IDR 200.000
</div>

<div class="size">

<label>SIZE</label>

<button class="size-option"
onclick="goToShipping('OVERSHIRT-TROUBLEMAKER','S')">
S
</button>

<button class="size-option active"
onclick="goToShipping('OVERSHIRT-TROUBLEMAKER','M')">
M
</button>

</div>

<a href="#"
class="btn"
onclick="goToShipping('OVERSHIRT-TROUBLEMAKER','M')">
BUY NOW
</a>

</div>
</div>

</div>

<script>

function goToShipping(product, size){

window.location.href =
"shipping.html?product=" + product +
"&size=" + size;

}

</script>

</body>
</html>
