<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHOP | INCLO.STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

html, body{
height:100%;
overflow:hidden;
}

body{
background:#050505;
color:white;
padding:15px 20px;
}

/* BACKGROUND LOGO */

.bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:450px;
opacity:0.02;
z-index:-1;
pointer-events:none;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:30px;
}
  .est{
font-size:11px;
letter-spacing:6px;
color:#777;
margin-bottom:10px;
  }

.brand{
font-size:12px;
letter-spacing:8px;
color:#8d8d8d;
margin-bottom:18px;
}

.header h1{
font-family:'Cinzel',serif;
font-size:52px;
letter-spacing:5px;
margin-bottom:18px;
}

.header p{
font-size:14px;
color:#a8a8a8;
line-height:1.8;
}

/* PRODUCTS */

.products{
display:flex;
flex-direction:column;
justify-content:space-between;
height:calc(100vh - 140px);
gap:12px;
}

/* CARD */

.card{
width:100%;
height:48%;

background:
linear-gradient(
145deg,
rgba(255,255,255,0.04),
rgba(255,255,255,0.01)
);

border:
1px solid rgba(255,255,255,0.08);

border-radius:28px;

overflow:hidden;

backdrop-filter:blur(12px);

transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
border:1px solid rgba(255,255,255,0.15);
}

/* PRODUCT IMAGE */

.card img{
width:100%;
height:120px;
object-fit:cover;
}

/* INFO */

.info{
padding:12px;
}
.size{
margin:10px 0 12px 0;
}

.size-option{
padding:6px 14px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:transparent;
color:white;
cursor:pointer;
margin-top:8px;
}

.size-option.active{
background:white;
color:black;
}

.category{
font-size:11px;
letter-spacing:4px;
color:#8c8c8c;
margin-bottom:12px;
}

.info h2{
font-size:16px;
margin-bottom:6px;
font-weight:600;
}

.desc{
font-size:13px;
line-height:1.8;
color:#b5b5b5;
margin-bottom:22px;
}

.price{
font-size:13px;
margin-bottom:6px;
font-weight:500;
}

/* BUTTON */

.btn{
display:inline-block;

padding:8px 18px;

border-radius:100px;

background:white;
color:black;

text-decoration:none;

font-size:12px;
letter-spacing:3px;
font-weight:600;

transition:0.4s;
}

.btn:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:768px){

.header h1{
font-size:36px;
}

.card{
width:100%;
}

.bg-logo{
width:350px;
}

}
  

</style>
</head>

<body>

<!-- BACKGROUND LOGO -->

<img src="logo_incloofficial.png" class="bg-logo">

<!-- HEADER -->

<div class="header">

<div class="est">
EST.2022
</div>

<h1>
INCLO STORE<br>
COLLECTION
</h1>

</div>

<!-- PRODUCTS -->
<div class="products">

  <!-- PRODUCT 1 -->
  <div class="card">

    <img src="noir_front.jpg">

    <div class="info">

      <h2>SNSB NOIR HOODIE</h2>

      <div class="price">IDR 680.000</div>

      <div class="size">
        <label>SIZE:</label>

        <button class="size-option active"
        onclick="goToShipping('SNSB-NOIR-HOODIE','M')">
        M
        </button>
      </div>

      <a href="#" class="btn"
      onclick="goToShipping('SNSB-NOIR-HOODIE','M')">
      BUY NOW
      </a>

    </div>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">

    <img src="tee_black.jpg">

    <div class="info">

      <h2>OVERSHIRT TROUBLEMMAKER</h2>

      <div class="price">IDR 200.000</div>

      <div class="size">
        <label>SIZE:</label>

        <button class="size-option"
        onclick="goToShipping('OVERSHIRT-TROUBLEMMAKER','S')">
        S
        </button>

        <button class="size-option active"
        onclick="goToShipping('OVERSHIRT-TROUBLEMMAKER','M')">
        M
        </button>
      </div>

      <a href="#" class="btn"
      onclick="goToShipping('OVERSHIRT-TROUBLEMMAKER','M')">
      BUY NOW
      </a>

    </div>
  </div>

</div>
<script>
function goToShipping(product, size){
window.location.href =
"shipping.html?product=" + product +
"&size=" + size;
}
</script>
</body>
</html>
