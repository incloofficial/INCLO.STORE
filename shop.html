<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHOP | INCLO.STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
padding:30px;
}

/* BACKGROUND LOGO */

.bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:600px;
opacity:0.03;
z-index:-1;
pointer-events:none;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:70px;
}

.brand{
font-size:12px;
letter-spacing:8px;
color:#8d8d8d;
margin-bottom:18px;
}

.header h1{
font-family:'Cinzel',serif;
font-size:52px;
letter-spacing:5px;
margin-bottom:18px;
}

.header p{
font-size:14px;
color:#a8a8a8;
line-height:1.8;
}

/* PRODUCTS */

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:35px;
}

/* CARD */

.card{
width:320px;

background:
linear-gradient(
145deg,
rgba(255,255,255,0.04),
rgba(255,255,255,0.01)
);

border:
1px solid rgba(255,255,255,0.08);

border-radius:28px;

overflow:hidden;

backdrop-filter:blur(12px);

transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
border:1px solid rgba(255,255,255,0.15);
}

/* PRODUCT IMAGE */

.card img{
width:100%;
height:400px;
object-fit:cover;
}

/* INFO */

.info{
padding:24px;
}

.category{
font-size:11px;
letter-spacing:4px;
color:#8c8c8c;
margin-bottom:12px;
}

.info h2{
font-size:25px;
margin-bottom:12px;
font-weight:600;
}

.desc{
font-size:13px;
line-height:1.8;
color:#b5b5b5;
margin-bottom:22px;
}

.price{
font-size:18px;
margin-bottom:28px;
font-weight:500;
}

/* BUTTON */

.btn{
display:inline-block;

padding:14px 34px;

border-radius:100px;

background:white;
color:black;

text-decoration:none;

font-size:12px;
letter-spacing:3px;
font-weight:600;

transition:0.4s;
}

.btn:hover{
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:768px){

.header h1{
font-size:36px;
}

.card{
width:100%;
}

.bg-logo{
width:350px;
}

}

</style>
</head>

<body>

<!-- BACKGROUND LOGO -->

<img src="logo_incloofficial.png" class="bg-logo">

<!-- HEADER -->

<div class="header">

<div class="brand">
INCLO.STORE
</div>

<h1>
EXCLUSIVE<br>
COLLECTION
</h1>

<p>
Minimal silhouette with monochrome identity.<br>
Designed to stay timeless.
</p>

</div>

<!-- PRODUCTS -->

<div class="products">

<!-- PRODUCT 1 -->

<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop">

<div class="info">

<div class="category">
LIMITED SERIES
</div>

<h2>
SNSB NOIR HOODIE
</h2>

<p class="desc">
Heavy monochrome aesthetic with clean structure
and understated luxury aura.
</p>

<div class="price">
IDR 289.000
</div>

<a href="shipping.html?product=SNSB-NOIR-HOODIE" class="btn">
BUY NOW
</a>

</div>
</div>

</div>

</body>
</html>
