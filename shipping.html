<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHIPPING | INCLO.STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#050505;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

/* BG LOGO */

.bg-logo{
position:absolute;
width:500px;
opacity:0.03;
z-index:-1;
}

/* BOX */

.box{
width:100%;
max-width:420px;

background:
linear-gradient(
145deg,
rgba(255,255,255,0.04),
rgba(255,255,255,0.01)
);

border:
1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

padding:35px;
border-radius:28px;
}

/* TITLE */

.title{
text-align:center;
margin-bottom:30px;
}

.title h1{
font-size:32px;
letter-spacing:3px;
margin-bottom:10px;
}

.title p{
font-size:13px;
color:#9f9f9f;
line-height:1.7;
}

/* INPUT */

input{
width:100%;
padding:16px;

margin-top:16px;

background:#111;

border:
1px solid rgba(255,255,255,0.06);

border-radius:16px;

color:white;
font-size:14px;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:16px;
margin-top:25px;

border:none;
border-radius:100px;

background:white;
color:black;

font-weight:600;
letter-spacing:2px;

cursor:pointer;
transition:0.4s;
}

button:hover{
transform:translateY(-3px);
}

/* MOBILE */

@media(max-width:768px){

.box{
padding:28px;
}

.title h1{
font-size:26px;
}

}

</style>
</head>

<body>

<img src="logo_incloofficial.png" class="bg-logo">

<div class="box">

<div class="title">
<h1>SHIPPING</h1>

<p>
Complete your shipping details before payment.
</p>
</div>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Phone Number">

<input type="text" placeholder="Address">

<button onclick="window.location.href='payment.html'">
CONTINUE
</button>

</div>

</body>
</html>
