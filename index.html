<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>INCLO.STORE</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0d0d0d;
      color:white;
    }

    .hero{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
      background:linear-gradient(
      to bottom,
      #000,
      #111,
      #1a1a1a
      );
    }

    h1{
      font-size:52px;
      letter-spacing:6px;
      margin-bottom:15px;
    }

    p{
      color:#bdbdbd;
      max-width:500px;
      line-height:1.7;
      margin-bottom:30px;
    }

    .btn{
      padding:14px 35px;
      border:1px solid #444;
      color:white;
      text-decoration:none;
      border-radius:50px;
      transition:0.3s;
      background:#151515;
    }

    .btn:hover{
      background:white;
      color:black;
    }

  </style>
</head>
<body>

  <section class="hero">

    <h1>INCLO.STORE</h1>

    <p>
      Elegant streetwear with monochrome identity.
      Exclusive look. Affordable value.
    </p>

    <a href="#" class="btn">
      EXPLORE
    </a>

  </section>

</body>
</html>
